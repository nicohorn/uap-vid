# Native install scripts pnpm v11+ requires explicit approval for.
# `allowBuilds` is the v11 replacement for v10's `onlyBuiltDependencies`
# and is read even in non-monorepo projects.
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true
