version: '3'

services:
  uap-research:
    image: uapvid
    restart: always
    build:
      context: .
      dockerfile: ./Dockerfile
    env_file:
      - ../apps/enviroments/uap-vid.env
    environment:
      - UPLOAD_DIR=/app/uploads
    volumes:
      - ./uploads:/app/uploads
    networks:
      - node-next
      - exposed-services

networks:
  node-next:
  exposed-services:
    external: true